name: Complaint Knowledge Base
description: Knowledge base for common customer complaints and their solutions
version: 1.0.0

categories:
  - id: billing_issue
    name: Billing Issues
    description: Problems related to charges, invoices, and payments
    articles:
      - id: billing_001
        title: Unexpected Charge on Account
        keywords: [charge, unexpected, billing, invoice, payment]
        solution: |
          1. Review the transaction details in your account statement
          2. Check if the charge matches any recent purchases or subscriptions
          3. Verify if it's a recurring subscription charge
          4. If unrecognized, we can initiate a dispute within 60 days
        resolution_time: 3-5 business days
        
      - id: billing_002
        title: Payment Not Reflected
        keywords: [payment, not reflected, pending, processing]
        solution: |
          1. Payments typically process within 24-48 hours
          2. Check your bank statement for the deduction
          3. Verify you used the correct payment method
          4. If payment was made over 48 hours ago, we'll investigate immediately
        resolution_time: 1-2 business days
        
      - id: billing_003
        title: Incorrect Amount Charged
        keywords: [wrong amount, overcharged, incorrect charge]
        solution: |
          1. Compare the charge with your service agreement
          2. Check for any recent plan changes or upgrades
          3. Review any applicable taxes or fees
          4. We can issue a credit adjustment if an error occurred
        resolution_time: 2-3 business days

  - id: service_outage
    name: Service Outage
    description: Issues with service availability and connectivity
    articles:
      - id: outage_001
        title: Complete Service Outage
        keywords: [outage, down, not working, unavailable, offline]
        solution: |
          1. Check our status page for known outages in your area
          2. Verify your account is active and in good standing
          3. Try restarting your device/equipment
          4. Check if other services are affected
          5. We'll provide updates every 2 hours during outages
        resolution_time: Varies by severity
        
      - id: outage_002
        title: Intermittent Service Issues
        keywords: [intermittent, sporadic, on and off, unstable]
        solution: |
          1. Document when the issues occur (time, duration)
          2. Check for any patterns (time of day, specific features)
          3. Test from different devices if possible
          4. We may need to run diagnostics on your connection
        resolution_time: 1-3 business days
        
      - id: outage_003
        title: Slow Performance
        keywords: [slow, sluggish, lag, performance, speed]
        solution: |
          1. Run a speed test to measure current performance
          2. Check if multiple devices are using the service
          3. Verify no background downloads or updates are running
          4. Clear cache and temporary files
          5. We can schedule a technical assessment if needed
        resolution_time: 1-2 business days

  - id: product_defect
    name: Product Defects
    description: Issues with product quality or functionality
    articles:
      - id: defect_001
        title: Product Not Working as Expected
        keywords: [defect, broken, malfunction, not working, faulty]
        solution: |
          1. Verify the product is being used according to instructions
          2. Check if firmware/software updates are available
          3. Review warranty coverage and terms
          4. Document the issue with photos/videos if possible
          5. We can arrange repair, replacement, or refund based on warranty
        resolution_time: 5-7 business days
        
      - id: defect_002
        title: Damaged Product Received
        keywords: [damaged, broken on arrival, shipping damage]
        solution: |
          1. Do not discard packaging materials
          2. Take photos of the damage and packaging
          3. Report within 48 hours of delivery
          4. We'll arrange immediate replacement at no cost
        resolution_time: 3-5 business days
        
      - id: defect_003
        title: Missing Parts or Accessories
        keywords: [missing, incomplete, parts missing, accessories]
        solution: |
          1. Check all packaging materials thoroughly
          2. Review the product contents list
          3. Verify what should be included with your model
          4. We'll ship missing items at no charge
        resolution_time: 3-5 business days

  - id: account_access
    name: Account Access Issues
    description: Problems logging in or accessing account features
    articles:
      - id: access_001
        title: Cannot Login to Account
        keywords: [login, password, access, locked out, forgot password]
        solution: |
          1. Try the "Forgot Password" option to reset
          2. Verify you're using the correct email/username
          3. Check if Caps Lock is on
          4. Clear browser cache and cookies
          5. Try a different browser or device
          6. Account may be locked after multiple failed attempts (unlocks in 30 min)
        resolution_time: Immediate to 1 hour
        
      - id: access_002
        title: Account Suspended or Locked
        keywords: [suspended, locked, deactivated, blocked]
        solution: |
          1. Check email for suspension notifications
          2. Review account terms for potential violations
          3. Verify payment method is current
          4. Contact us to review suspension reason
          5. We can reactivate after resolving the issue
        resolution_time: 1-2 business days
        
      - id: access_003
        title: Cannot Access Specific Features
        keywords: [feature not available, permission denied, restricted]
        solution: |
          1. Verify your subscription plan includes this feature
          2. Check if feature requires additional setup
          3. Ensure your account permissions are correct
          4. Try logging out and back in
          5. We can upgrade your plan if needed
        resolution_time: Immediate to 1 business day

  - id: technical_support
    name: Technical Support
    description: General technical issues and troubleshooting
    articles:
      - id: tech_001
        title: Error Messages
        keywords: [error, error message, error code, system error]
        solution: |
          1. Note the exact error message or code
          2. Document what you were doing when error occurred
          3. Try clearing cache and restarting
          4. Check if issue persists across devices
          5. Provide error details for faster resolution
        resolution_time: 1-3 business days
        
      - id: tech_002
        title: Integration or Compatibility Issues
        keywords: [integration, compatibility, not compatible, doesn't work with]
        solution: |
          1. Verify system requirements are met
          2. Check for software/firmware updates
          3. Review integration documentation
          4. Test with recommended configurations
          5. We can provide technical consultation
        resolution_time: 2-4 business days

  - id: general_inquiry
    name: General Inquiries
    description: General questions and information requests
    articles:
      - id: general_001
        title: How to Contact Support
        keywords: [contact, support, help, reach, phone number]
        solution: |
          Available support channels:
          - Chat: Available 24/7 through our website
          - Email: support@company.com (response within 24 hours)
          - Phone: 1-800-XXX-XXXX (Mon-Fri 8AM-8PM EST)
          - Social Media: @company on Twitter/Facebook
        resolution_time: Immediate
        
      - id: general_002
        title: Account Information Update
        keywords: [update, change, modify, edit, information]
        solution: |
          1. Log into your account
          2. Navigate to Account Settings
          3. Update desired information
          4. Verify changes with confirmation email
          5. Contact us if you need to change email or username
        resolution_time: Immediate

# Escalation Rules
escalation_rules:
  - condition: complaint_severity == "critical"
    action: immediate_escalation
    target: senior_support_team
    
  - condition: complaint_category == "billing_issue" AND amount > 500
    action: escalate_to_billing_specialist
    
  - condition: customer_sentiment < -0.7
    action: escalate_to_supervisor
    
  - condition: resolution_time > 7_days
    action: escalate_to_management
    
  - condition: repeat_complaint == true
    action: priority_handling
    priority: high

# Response Templates
response_templates:
  empathy_statements:
    - "I completely understand how frustrating this must be for you."
    - "I apologize for the inconvenience this has caused."
    - "Thank you for your patience while we work on resolving this."
    - "I can see why this would be concerning."
    - "Your feedback is valuable and helps us improve."
  
  reassurance_statements:
    - "We're committed to resolving this issue for you."
    - "I'll make sure this gets the attention it deserves."
    - "We'll keep you updated throughout the process."
    - "You're in good hands, and we'll take care of this."
    - "We appreciate your business and want to make this right."
  
  closing_statements:
    - "Is there anything else I can help you with today?"
    - "Thank you for bringing this to our attention."
    - "We appreciate your patience and understanding."
    - "Please don't hesitate to reach out if you need further assistance."
    - "Have a great day, and thank you for being a valued customer."

# FAQ Quick Responses
faq:
  - question: "How long will it take to resolve my issue?"
    answer: "Resolution time varies by issue type. I've provided an estimated timeframe based on your specific complaint. You'll receive regular updates throughout the process."
    
  - question: "Can I speak to a supervisor?"
    answer: "Of course! I can transfer you to a supervisor. However, I'd like to try to help you first if possible. May I ask what specific concern you have?"
    
  - question: "Will I be charged for this support?"
    answer: "No, our customer support is complimentary for all account holders. There's no charge for assistance with your issue."
    
  - question: "How do I check my ticket status?"
    answer: "You can check your ticket status by logging into your account and visiting the Support section, or by using your ticket ID: {ticket_id}"
    
  - question: "What if I'm not satisfied with the resolution?"
    answer: "Your satisfaction is important to us. If you're not satisfied with the resolution, you can request a review or escalation at any time."

